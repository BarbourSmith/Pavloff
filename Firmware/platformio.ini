; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp1

[env]
platform = espressif32@6.4.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_ota.csv
lib_deps = 
	electroniccats/MPU6050@^1.4.4

[env:esp1]
build_src_filter = +<esp1/>
build_flags = 
	-D ESP1_BUILD
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1

; Minimal code example — demonstrates wake-on-motion and battery reading.
; Inherits platform, board, framework, and lib_deps from [env] above.
; Flash with: pio run -e minimal -t upload
[env:minimal]
build_src_filter = -<*> +<minimal/>
build_flags =
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
